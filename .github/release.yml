changelog:
  exclude:
    labels:
      - Ignore
    authors:
      - dependabot
  categories:
    - title: Enhancements & Features ✨
      labels:
        - Issue-Enhancement
    - title: Squashed Bugs 🐛
      labels:
        - Issue-Bug
    - title: Performance Improvements ⚡
      labels:
        - Issue-Performance
    - title: Other Changes 🙏
      labels:
        - "*"
